<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lista de Produtos</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="auth-overlay" id="authOverlay" hidden>
  <form class="auth-card" id="authForm">
    <h1 class="auth-brand">WishBoard</h1>
    <h2 class="auth-title" id="authTitle">Entrar</h2>
    <p class="auth-error" id="authError" role="alert"></p>

    <label class="field">
      <span>Usuário</span>
      <input type="text" id="authUser" autocomplete="username" autocapitalize="none" spellcheck="false" required />
    </label>

    <label class="field">
      <span>Senha</span>
      <input type="password" id="authPass" autocomplete="current-password" required />
    </label>

    <button type="submit" class="btn btn-primary auth-submit" id="authSubmit">Entrar</button>

    <p class="auth-toggle">
      <span id="authToggleText">Não tem uma conta?</span>
      <button type="button" class="auth-link" id="authToggle">Criar conta</button>
    </p>
  </form>
</div>

<header class="topbar">
  <div class="topbar-row">
    <nav class="categories" aria-label="Categorias">
      <button type="button" class="cat-btn" id="todasBtn">
        <span>Todas</span>
        <span class="cat-arrow" aria-hidden="true">▾</span>
      </button>
    </nav>

    <div class="summary">
      <span class="summary-item" id="itemCount">0 itens</span>
      <span class="summary-sep">·</span>
      <span class="summary-item" id="itemTotal">R$ 0,00</span>
      <button class="btn btn-primary" id="openAddBtn" type="button">+ Adicionar</button>
      <button class="btn" id="exportBtn" type="button">Exportar</button>
      <label class="btn" for="importInput">Importar</label>
      <input type="file" id="importInput" accept="application/json" hidden />
      <span class="summary-sep">·</span>
      <span class="summary-item summary-user" id="currentUserName"></span>
      <button class="btn" id="logoutBtn" type="button">Sair</button>
    </div>
  </div>

  <div class="cat-panel" id="catPanel">
    <nav class="subcat-nav" id="subcatNav" aria-label="Filtrar por categoria"></nav>
    <div class="grid" id="catGrid"></div>
    <p class="empty-state" id="catEmpty">Nenhum item nesta categoria ainda.</p>
  </div>
</header>

<div class="modal-overlay" id="modalOverlay" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-header">
      <h3 id="modalTitle">Adicionar item</h3>
      <button class="modal-close" id="closeModalBtn" type="button" aria-label="Fechar">&times;</button>
    </div>

    <form id="addForm" class="modal-body">
      <label class="field">
        <span>Link do produto</span>
        <div class="field-row">
          <input type="url" id="urlInput" placeholder="https://www.amazon.com.br/..." required />
          <button type="button" class="btn" id="fetchBtn">Buscar dados</button>
        </div>
      </label>

      <p class="fetch-status" id="fetchStatus"></p>

      <div class="preview-box" id="previewBox" hidden>
        <img id="previewImage" alt="" />
        <div class="preview-info">
          <strong id="previewTitle"></strong>
          <span id="previewDomain"></span>
        </div>
      </div>

      <label class="field">
        <span>Título</span>
        <input type="text" id="titleInput" placeholder="Título do produto" required />
      </label>

      <label class="field">
        <span>Descrição</span>
        <textarea id="descInput" rows="2" placeholder="Descrição curta (opcional)"></textarea>
      </label>

      <label class="field">
        <span>URL da imagem</span>
        <input type="url" id="imageInput" placeholder="https://..." />
      </label>

      <div class="field-group">
        <label class="field">
          <span>Categoria</span>
          <select id="categoryInput" required></select>
        </label>

        <label class="field">
          <span>Preço (R$)</span>
          <input type="text" id="priceInput" placeholder="R$ 0,00" required />
        </label>
      </div>

      <div class="field ocr-field">
        <span>Preço por print (opcional)</span>
        <div class="ocr-dropzone" id="ocrDropzone" tabindex="0" role="button" aria-label="Cole ou selecione uma imagem do preço">
          <img class="ocr-thumb" id="ocrThumb" alt="" hidden />
          <p class="ocr-drop-text">Cole sua imagem (⌘V) ou <label class="ocr-pick" for="priceOcrInput">selecione um arquivo do seu computador</label></p>
        </div>
        <input type="file" id="priceOcrInput" accept="image/*" hidden />
        <p class="ocr-status" id="ocrStatus"></p>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn" id="cancelBtn">Cancelar</button>
        <button type="submit" class="btn btn-primary" id="submitItemBtn">Adicionar</button>
      </div>
    </form>
  </div>
</div>

<div class="modal-overlay" id="categoryModalOverlay" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="categoryModalTitle">
    <div class="modal-header">
      <h3 id="categoryModalTitle">Gerenciar categorias</h3>
      <button class="modal-close" id="closeCategoryModalBtn" type="button" aria-label="Fechar">&times;</button>
    </div>

    <div class="modal-body">
      <div class="field-row">
        <input type="text" id="newCategoryInput" placeholder="Nova categoria" />
        <button type="button" class="btn" id="addCategoryBtn">Adicionar</button>
      </div>

      <div class="category-manage-list" id="categoryManageList"></div>
    </div>
  </div>
</div>

<template id="cardTemplate">
  <article class="card">
    <div class="card-image-wrap">
      <img class="card-image" alt="" loading="lazy" />
    </div>
    <div class="card-body">
      <div class="card-domain"></div>
      <h3 class="card-title"></h3>
      <p class="card-desc"></p>
      <div class="card-footer">
        <span class="card-price"></span>
        <a class="card-link" target="_blank" rel="noopener noreferrer">Ver produto ↗</a>
      </div>
      <div class="card-controls">
        <button class="card-move-up" type="button" title="Mover para cima">▲</button>
        <button class="card-move-down" type="button" title="Mover para baixo">▼</button>
        <button class="card-toggle-total" type="button" title="Incluir/excluir do valor total">
          <svg class="icon-eye" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
          <svg class="icon-eye-off" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display: none">
            <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a18.6 18.6 0 0 1 4.22-5.06M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 7 11 7a18.5 18.5 0 0 1-2.16 3.19M14.12 14.12a3 3 0 1 1-4.24-4.24" />
            <line x1="1" y1="1" x2="23" y2="23" />
          </svg>
        </button>
        <button class="card-drag" type="button" title="Arrastar para reordenar" aria-label="Arrastar para reordenar">⠿</button>
        <button class="card-edit" type="button" title="Editar">Editar</button>
        <button class="card-remove" type="button" title="Remover">Excluir</button>
      </div>
    </div>
  </article>
</template>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="auth.js"></script>
<script src="script.js"></script>
</body>
</html>
